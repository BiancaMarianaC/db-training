# ============================================================================
# frontend/nginx.conf — TICKET-I126 + TICKET-I128
# ============================================================================
# WHAT:    Nginx server block for the production React UI.
# HOW:     SPA fallback + reverse proxy for the API.
# WHY:     One origin (no CORS), one image, easy to deploy.
# OBSERVE: GET /trades returns index.html (so React Router takes over).
#          GET /api/v1/trades is proxied to the backend container.
# ============================================================================

server {
    listen 80;
    server_name _;

    # ---- SPA fallback ------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Reverse-proxy API to the backend container ------------------------
    # TODO(TICKET-I128): inside docker-compose the backend is reachable as
    #                    `backend:8080`. Outside compose, you'd point this
    #                    at host.docker.internal or another DNS name.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /actuator/ {
        proxy_pass http://backend:8080;
    }
}
